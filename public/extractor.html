<!DOCTYPE html>
<html>
<head>
    <title>Memory Extractor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        textarea { width: 100%; height: 400px; margin: 10px 0; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Extract Your Memories</h1>
    <p>This tool will extract your memories from the browser and prepare them for embedding.</p>

    <button id="extractBtn">Extract Memories</button>
    <button id="copyBtn" style="display:none;">Copy Data</button>

    <h3>Extracted Data:</h3>
    <textarea id="output" readonly></textarea>

    <p><strong>Instructions:</strong></p>
    <ol>
        <li>Click "Extract Memories" to get your data</li>
        <li>Click "Copy Data" to copy the JSON</li>
        <li>Send the copied data to the developer</li>
    </ol>

    <script>
        document.getElementById('extractBtn').addEventListener('click', async () => {
            try {
                const request = indexedDB.open('anniversary-memory-db');
                request.onsuccess = () => {
                    const db = request.result;
                    const tx = db.transaction('memories', 'readonly');
                    const store = tx.objectStore('memories');
                    const getAll = store.getAll();

                    getAll.onsuccess = () => {
                        const data = getAll.result;
                        const output = document.getElementById('output');
                        output.value = JSON.stringify(data, null, 2);
                        document.getElementById('copyBtn').style.display = 'inline-block';

                        const blob = new Blob([output.value], { type: 'application/json' });
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = `memories-backup-${new Date().toISOString().split('T')[0]}.json`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);

                        alert(`Found ${data.length} memories! Backup file downloaded automatically.`);
                    };

                    getAll.onerror = () => {
                        alert('Error extracting memories');
                    };
                };

                request.onerror = () => {
                    alert('Could not open database');
                };
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            const output = document.getElementById('output');
            output.select();
            document.execCommand('copy');
            alert('Data copied to clipboard!');
        });
    </script>
</body>
</html>
